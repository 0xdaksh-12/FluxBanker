# Render Production Profile - Minimalist (PSQL Only)

# Disable Infrastructure
app.kafka.enabled=false
app.redis.enabled=false
app.node-env=production

# Enable Caching & Auto-Configs
spring.cache.type=simple
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Disable Monitoring (No Prometheus/Grafana)
management.endpoints.web.exposure.include=health
management.prometheus.metrics.export.enabled=false

# Port Configuration
server.port=${PORT:8080}

# App Configuration
app.admin-emails=${ADMIN_EMAILS:}

# Mail Configuration
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.test-connection=false

# Production Logging
logging.level.root=INFO
logging.level.com.fluxbanker=INFO
