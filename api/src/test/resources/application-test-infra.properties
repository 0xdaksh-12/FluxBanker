
# Re-enable services that are disabled in 'test' profile
app.kafka.enabled=true
app.redis.enabled=true
spring.cache.type=redis

# Clear autoconfiguration exclusions from 'test' profile
spring.autoconfigure.exclude=

# Override datasource to use Postgres
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/fluxbanker
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_HOST:localhost}:9092
