# Test Profile Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop

# Disable Kafka and Redis for tests
app.kafka.enabled=false
app.redis.enabled=false
spring.cache.type=none

# Exclude Autoconfigurations
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration, \
                             org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration


# JWT Secrets for Testing (must match jwt.* prefix used in JwtService)
jwt.secret.access=bXktc3VwZXItc2VjcmV0LWtleS10aGF0LWlzLWF0LWxlYXN0LTMyLWJ5dGVzLWxvbmctZm9yLWp3dA==
jwt.secret.refresh=bXktc3VwZXItc2VjcmV0LWtleS10aGF0LWlzLWF0LWxlYXN0LTMyLWJ5dGVzLWxvbmctZm9yLWp3dA==
jwt.expiration-ms=3600000
jwt.refresh-expiration-ms=604800000

# App
app.client-url=http://localhost:5173
app.admin-emails=
app.node-env=test
