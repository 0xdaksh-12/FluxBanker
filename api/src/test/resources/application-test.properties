# Test Profile Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=create-drop

# Disable Kafka and Redis for tests by default unless specifically needed
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration, \
                             org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# JWT Secrets for Testing (must match jwt.* prefix used in JwtService)
jwt.secret.access=test_access_secret_must_be_long_enough_to_be_secure_for_jjwt
jwt.secret.refresh=test_refresh_secret_must_be_long_enough_to_be_secure_for_jjwt
jwt.expiration-ms=3600000
jwt.refresh-expiration-ms=604800000

# App
app.client-url=http://localhost:5173
app.admin-emails=
