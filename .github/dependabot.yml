version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      spring-dependencies:
        patterns:
          - "org.springframework.*"

  - package-ecosystem: "npm"
    directory: "/app"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
