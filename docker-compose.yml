services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: fluxbanker-api
    env_file:
      - ./api/.env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/fluxbanker
      - REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    ports:
      - "8080:8080"
      - "5005:5005" # Remote debugging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    develop:
      watch:
        # Rebuild the image if pom.xml changes (new dependencies)
        - action: rebuild
          path: ./api/pom.xml
        # Rebuild on Dockerfile changes
        - action: rebuild
          path: ./api/Dockerfile
        # Sync source code for hot-reload via spring-boot-devtools
        - action: sync
          path: ./api/src
          target: /app/src

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: fluxbanker-app
    env_file:
      - ./app/.env
    ports:
      - "5173:80"
    depends_on:
      - api

  tester:
    image: eclipse-temurin:17-jdk-jammy
    container_name: fluxbanker-tester
    volumes:
      - ./api:/app
    working_dir: /app
    environment:
      - SPRING_PROFILES_ACTIVE=test-infra
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - KAFKA_HOST=kafka
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    container_name: fluxbanker-db
    environment:
      POSTGRES_DB: fluxbanker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_LOG_MIN_MESSAGES: warning
    command:
      [
        "postgres",
        "-c",
        "log_min_messages=warning",
        "-c",
        "log_min_error_statement=warning",
      ]
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fluxbanker"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fluxbanker-redis
    command: ["redis-server", "--loglevel", "warning"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: fluxbanker-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      CLUSTER_ID: "MkU3MjYyN0U0QjQzNEM1Mz"
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
      KAFKA_LOG4J_LOGGERS: "kafka=WARN,kafka.controller=WARN,kafka.log.LogCleaner=WARN,state.change.logger=WARN,kafka.producer.async.DefaultEventHandler=WARN"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: fluxbanker-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./api/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--log.level=warn"

  grafana:
    image: grafana/grafana:latest
    container_name: fluxbanker-grafana
    user: "root"
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_LOG_LEVEL=warn
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  kafka_data:
